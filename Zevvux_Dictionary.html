        function init() {
            const posSet = new Set();
            dictionaryData.forEach(entry => {
                entry.senses.forEach(s => {
                    if (s.pos) posSet.add(s.pos);
                });
            });

            const posFilter = document.getElementById('posFilter');
            const sortedPos = Array.from(posSet).sort();
            sortedPos.forEach(pos => {
                const opt = document.createElement('option');
                opt.value = pos;
                opt.textContent = pos;
                posFilter.appendChild(opt);
            });

            filterEntries();
        }

        function render(data) {
            const container = document.getElementById('entryList');
            const stats = document.getElementById('stats');
            container.innerHTML = '';
            stats.textContent = `找到 ${data.length} 个结果`;

            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            data.forEach(entry => {
                const div = document.createElement('div');
                div.className = 'entry';
                
                const sensesHtml = entry.senses.map(s => `
                    <div class="sense">
                        <span class="pos">[${s.pos}]</span>
                        <span class="definition">${highlightText(s.definition, query)}</span>
                        ${s.note ? `<div class="note">${highlightText(s.note, query)}</div>` : ''}
                    </div>
                `).join('');

                div.innerHTML = `
                    <div class="word">${highlightText(entry.word, query)}</div>
                    ${sensesHtml}
                `;
                container.appendChild(div);
            });
        }

        function highlightText(text, query) {
            if (!query) return text;
            try {
                const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            } catch(e) { return text; }
        }

            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const pos = document.getElementById('posFilter').value;

            const filtered = dictionaryData.filter(entry => {
                const matchesQuery = !query || 
                                   entry.word.toLowerCase().includes(query) || 
                                   entry.senses.some(s => s.definition.toLowerCase().includes(query) || s.note.toLowerCase().includes(query));
                
                const matchesPos = !pos || entry.senses.some(s => s.pos === pos);
                
                return matchesQuery && matchesPos;
            });

            render(filtered);
        }

        init();
    </script>
</body>
</html>
